<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@400;500;600&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ===== CSS Variables ===== */
    :root {
      /* Analytical theme (gold/dark) */
      --bg-primary: #0f1419;
      --bg-secondary: #1a2332;
      --bg-tertiary: #232d3f;
      --text-primary: #e8eaed;
      --text-secondary: #9aa0a6;
      --text-muted: #6b7280;
      --accent: #d4af37;
      --accent-hover: #e8c252;
      --accent-green: #34d399;
      --accent-red: #f87171;
      --accent-yellow: #fbbf24;
      --border: #2d3748;
      --table-alt: rgba(255,255,255,0.03);

      /* Typography */
      --font-display: 'Crimson Pro', Georgia, serif;
      --font-body: 'IBM Plex Sans', 'Helvetica Neue', sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', monospace;

      /* Spacing */
      --container-max: 900px;
      --container-padding: 3rem;

      /* Animation */
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
    }

    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-primary);
      background-image: radial-gradient(ellipse at top, rgba(212,175,55,0.06) 0%, transparent 60%);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.75;
      min-height: 100vh;
    }

    /* ===== Layout ===== */
    .report-container {
      max-width: var(--container-max);
      margin: 0 auto;
      padding: var(--container-padding);
    }

    /* ===== Header ===== */
    .report-header {
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .report-header h1 {
      font-family: var(--font-display);
      font-size: 2.75rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .report-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .report-meta .accent {
      color: var(--accent);
    }

    /* ===== Report Body ===== */
    .report-body {
      animation: fadeInUp 0.5s var(--ease-out) both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Staggered animation for sections */
    .report-body h2 {
      animation: fadeInUp 0.5s var(--ease-out) both;
    }
    .report-body h2:nth-child(1) { animation-delay: 0.05s; }
    .report-body h2:nth-child(2) { animation-delay: 0.1s; }
    .report-body h2:nth-child(3) { animation-delay: 0.15s; }
    .report-body h2:nth-child(4) { animation-delay: 0.2s; }
    .report-body h2:nth-child(5) { animation-delay: 0.25s; }

    /* ===== Typography ===== */
    .report-body h1,
    .report-body h2,
    .report-body h3,
    .report-body h4 {
      font-family: var(--font-display);
      color: var(--text-primary);
      line-height: 1.3;
    }

    .report-body h1 { font-size: 2.25rem; margin: 2.5rem 0 1.25rem; font-weight: 700; }
    .report-body h2 {
      font-size: 1.5rem;
      margin: 2.5rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
    }
    .report-body h3 { font-size: 1.2rem; margin: 1.75rem 0 0.75rem; font-weight: 600; }
    .report-body h4 { font-size: 1rem; margin: 1.5rem 0 0.5rem; font-weight: 600; color: var(--text-secondary); }

    .report-body p { margin: 1rem 0; }
    .report-body strong { color: var(--text-primary); font-weight: 600; }
    .report-body em { font-style: italic; }

    /* ===== Lists ===== */
    .report-body ul, .report-body ol {
      margin: 1rem 0;
      padding-left: 1.5rem;
    }
    .report-body li { margin: 0.4rem 0; }
    .report-body ul { list-style-type: none; }
    .report-body ul li::before {
      content: '▸';
      color: var(--accent);
      font-weight: bold;
      display: inline-block;
      width: 1.2em;
      margin-left: -1.5rem;
    }

    /* ===== Blockquotes ===== */
    .report-body blockquote {
      border-left: 3px solid var(--accent);
      background: var(--bg-secondary);
      margin: 1.5rem 0;
      padding: 1rem 1.5rem;
      border-radius: 0 8px 8px 0;
      color: var(--text-secondary);
      font-style: italic;
    }

    /* ===== Code ===== */
    .report-body code {
      font-family: var(--font-mono);
      font-size: 0.875em;
      background: var(--bg-tertiary);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      color: var(--accent-hover);
    }

    .report-body pre {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      overflow-x: auto;
      margin: 1.5rem 0;
    }

    .report-body pre code {
      background: none;
      padding: 0;
      font-size: 0.85rem;
      color: var(--text-primary);
    }

    /* ===== Tables ===== */
    .report-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.9rem;
    }

    .report-body th {
      background: var(--bg-secondary);
      font-weight: 600;
      text-align: left;
      padding: 0.75rem 1rem;
      border-bottom: 2px solid var(--border);
      color: var(--text-primary);
      font-family: var(--font-display);
      font-size: 0.95rem;
    }

    .report-body td {
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    .report-body tr:nth-child(even) { background: var(--table-alt); }
    .report-body tr:hover { background: rgba(212,175,55,0.05); }

    /* ===== Horizontal Rule ===== */
    .report-body hr {
      border: none;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
      margin: 2.5rem 0;
    }

    /* ===== Links ===== */
    .report-body a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s, color 0.2s;
    }
    .report-body a:hover {
      color: var(--accent-hover);
      border-bottom-color: var(--accent-hover);
    }

    /* ===== Emoji ===== */
    .report-body .emoji {
      font-family: appleEmoji, 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif;
      font-size: 1.1em;
    }

    /* ===== Footer ===== */
    .report-footer {
      margin-top: 4rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
      font-size: 0.8rem;
      text-align: center;
    }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      .report-container { padding: 1.5rem; }
      .report-header h1 { font-size: 2rem; }
      .report-body h1 { font-size: 1.75rem; }
      .report-body h2 { font-size: 1.25rem; }
      table { font-size: 0.8rem; }
      .report-body th, .report-body td { padding: 0.5rem 0.6rem; }
    }
  </style>
</head>
<body>
  <div class="report-container">
    <header class="report-header">
      <h1>{{ title }}</h1>
      <div class="report-meta">
        <span>Generated: <span class="accent">{{ generated_at }}</span></span>
      </div>
    </header>

    <main class="report-body">
      {{ body | safe }}
    </main>

    <footer class="report-footer">
      Rendered by html-renderer
    </footer>
  </div>
</body>
</html>
